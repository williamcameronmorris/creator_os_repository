# Supabase project config.
#
# This file is partial: it only defines auth email templates so they live in
# the repo. All other Auth settings (providers, SMTP, redirect URLs, etc.) are
# managed in the Supabase Dashboard. Do NOT run `supabase config push` against
# this file unless you have first synced the rest of the config locally, since
# missing sections may be reset to defaults on the remote project.

