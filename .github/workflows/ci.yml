name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck / test / build
    runs-on: ubuntu-latest
    env:
      # Unit tests don't hit Supabase, but modules that import ./lib/supabase
      # throw at load without these. Real values are injected at deploy time.
      VITE_SUPABASE_URL: http://localhost:54321
      VITE_SUPABASE_ANON_KEY: ci-anon-key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Using `npm install` rather than `npm ci` so CI tolerates short windows
      # of package.json / package-lock.json drift (e.g. when a dep is added
      # but the lockfile sync is committed in a follow-up). `npm ci` is
      # stricter but turns drift into a hard CI failure. Flip back to
      # `npm ci` once we've put discipline (or a pre-commit hook) around
      # lockfile sync.
      - run: npm install --no-audit --no-fund

      # Typecheck currently has ~268 pre-existing errors. Tracked as advisory
      # (continue-on-error) so the signal is visible in CI without blocking
      # PRs; flip to a hard gate once the debt is cleared.
      - name: Typecheck (advisory)
        run: npm run typecheck
        continue-on-error: true

      - run: npm run test

      - run: npm run build
